<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Naayaan Message Wall</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f2b;
      --surface: #1a1d3a;
      --border: #2a2d4a;
      --text: #e2e8f0;
      --muted: #64748b;
      --accent: #6366f1;
      --input-bg: #0d0f2b;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .container { max-width: 560px; margin: 0 auto; padding: 28px 16px 60px; }
    .header { text-align: center; margin-bottom: 28px; }
    .header-icon { font-size: 36px; margin-bottom: 8px; }
    .header h1 { font-size: 26px; font-weight: 900; color: var(--text); letter-spacing: -0.5px; }
    .header h1 span {
      background: linear-gradient(90deg, #6366f1, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header-sub { color: var(--muted); font-size: 14px; margin-top: 6px; }
    .msg-count {
      display: inline-block; margin-top: 10px;
      background: rgba(99,102,241,0.15); border: 1px solid rgba(99,102,241,0.3);
      color: #818cf8; border-radius: 20px; padding: 3px 14px; font-size: 13px;
    }
    .compose {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 18px; padding: 20px; margin-bottom: 24px;
    }
    .compose-title { font-size: 15px; font-weight: 700; margin-bottom: 14px; }
    .name-row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
    input[type="text"], textarea {
      background: var(--input-bg); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 14px; font-size: 14px;
      color: var(--text); outline: none; font-family: inherit;
      transition: border 0.2s; width: 100%;
    }
    input[type="text"]:focus, textarea:focus { border-color: var(--accent); }
    #nameInput { flex: 1; min-width: 140px; width: auto; }
    .anon-label {
      display: flex; align-items: center; gap: 6px; font-size: 13px;
      color: #94a3b8; cursor: pointer; background: var(--input-bg);
      border: 1px solid var(--border); border-radius: 10px;
      padding: 10px 14px; user-select: none; white-space: nowrap; flex-shrink: 0;
    }
    input[type="checkbox"] { accent-color: var(--accent); }
    .textarea-wrap { position: relative; }
    textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
    .char-count {
      position: absolute; bottom: 10px; right: 12px;
      font-size: 11px; color: var(--muted); pointer-events: none;
    }
    .char-count.warn { color: #ef4444; }
    .error-box {
      background: #3f1212; color: #f87171; border-radius: 8px;
      padding: 8px 12px; font-size: 12px; margin-top: 8px; display: none;
    }
    .btn-post {
      width: 100%; margin-top: 12px; background: var(--accent);
      color: white; border: none; border-radius: 10px; padding: 13px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      transition: background 0.3s, opacity 0.2s; letter-spacing: 0.3px;
    }
    .btn-post:active { opacity: 0.8; }
    .btn-post.success { background: #10b981; }
    .btn-post:disabled { opacity: 0.6; cursor: not-allowed; }
    .search-wrap { position: relative; margin-bottom: 18px; display: none; }
    .search-icon {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%); font-size: 14px;
      color: var(--muted); pointer-events: none;
    }
    #searchInput { padding-left: 34px; background: var(--surface); }
    #wall { display: flex; flex-direction: column; gap: 14px; }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 16px 18px; position: relative;
      opacity: 0; transform: translateY(12px);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }
    .card.visible { opacity: 1; transform: translateY(0); }
    .anon-badge {
      position: absolute; top: 12px; right: 14px; font-size: 10px;
      color: var(--muted); background: var(--bg); border: 1px solid var(--border);
      border-radius: 20px; padding: 2px 8px; letter-spacing: 0.5px;
    }
    .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .avatar {
      width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
