<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Naayaan Message Wall</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f2b;
      --surface: #1a1d3a;
      --border: #2a2d4a;
      --text: #e2e8f0;
      --muted: #64748b;
      --accent: #6366f1;
      --input-bg: #0d0f2b;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .container {
      max-width: 560px;
      margin: 0 auto;
      padding: 28px 16px 60px;
    }

    .header { text-align: center; margin-bottom: 28px; }
    .header-icon { font-size: 36px; margin-bottom: 8px; }
    .header h1 { font-size: 26px; font-weight: 900; color: var(--text); letter-spacing: -0.5px; }
    .header h1 span {
      background: linear-gradient(90deg, #6366f1, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header-sub { color: var(--muted); font-size: 14px; margin-top: 6px; }
    .msg-count {
      display: inline-block; margin-top: 10px;
      background: rgba(99,102,241,0.15); border: 1px solid rgba(99,102,241,0.3);
      color: #818cf8; border-radius: 20px; padding: 3px 14px; font-size: 13px;
    }

    .compose {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 18px; padding: 20px; margin-bottom: 24px;
    }
    .compose-title { font-size: 15px; font-weight: 700; margin-bottom: 14px; }

    .name-row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }

    input[type="text"], textarea {
      background: var(--input-bg); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 14px; font-size: 14px;
