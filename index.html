<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Private Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0f1e;
      --surface: #111827;
      --bubble-me: #2563eb;
      --bubble-them: #1f2937;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --border: #1e293b;
      --input-bg: #1e293b;
      --green: #22c55e;
      --accent: #3b82f6;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── JOIN SCREEN ── */
    #joinScreen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      gap: 20px;
    }

    .join-logo {
      width: 72px;
      height: 72px;
      background: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin-bottom: 8px;
    }

    .join-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      text-align: center;
    }

    .join-sub {
      font-size: 14px;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
    }

    .join-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .field-label {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.5px;
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    input[type="text"] {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: border 0.2s;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
    }

    .btn-join {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-top: 4px;
      transition: opacity 0.2s;
    }

    .btn-join:active { opacity: 0.8; }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .room-hint {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }

    /* ── CHAT SCREEN ── */
    #chatScreen {
      flex: 1;
      display: none;
      flex-direction: column;
      height: 100dvh;
    }

    /* Header */
    .chat-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .header-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .header-info { flex: 1; min-width: 0; }

    .header-name {
      font-size: 16px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .header-status {
      font-size: 12px;
      color: var(--green);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      display: inline-block;
    }

    .room-tag {
      background: var(--input-bg);
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 11px;
      color: var(--muted);
      flex-shrink: 0;
    }

    /* Messages area */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg-row {
      display: flex;
      flex-direction: column;
      max-width: 75%;
    }

    .msg-row.me { align-self: flex-end; align-items: flex-end; }
    .msg-row.them { align-self: flex-start; align-items: flex-start; }

    .msg-sender {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 3px;
      padding: 0 4px;
    }

    .bubble {
      padding: 9px 13px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.45;
      word-break: break-word;
      max-width: 100%;
    }

    .me .bubble {
      background: var(--bubble-me);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .them .bubble {
      background: var(--bubble-them);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    .msg-time {
      font-size: 10px;
      color: var(--muted);
      padding: 0 4px;
      margin-top: 3px;
    }

    /* Typing indicator */
    .typing-indicator {
      display: none;
      align-items: center;
      gap: 4px;
      padding: 6px 12px;
      flex-shrink: 0;
    }

    .typing-indicator span {
      font-size: 12px;
      color: var(--muted);
    }

    .typing-dots {
      display: flex;
      gap: 3px;
    }

    .typing-dots div {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      animation: typingBounce 1.2s infinite;
    }

    .typing-dots div:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots div:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    /* System messages */
    .sys-msg {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      padding: 4px 12px;
      background: var(--surface);
      border-radius: 20px;
      align-self: center;
      margin: 6px 0;
    }

    /* Input area */
    .input-area {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 10px 12px;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
      display: flex;
      align-items: flex-end;
      gap: 10px;
      flex-shrink: 0;
    }

    #msgInput {
      flex: 1;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 10px 16px;
      font-size: 15px;
      color: var(--text);
      outline: none;
      resize: none;
      max-height: 120px;
      overflow-y: auto;
      font-family: inherit;
      line-height: 1.4;
    }

    #msgInput:focus { border-color: var(--accent); }

    .btn-send {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn-send:active { transform: scale(0.9); opacity: 0.8; }

    .btn-send svg { width: 20px; height: 20px; fill: white; }

    /* Date separator */
    .date-sep {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      margin: 10px 0;
      align-self: center;
    }

    /* Popup for sharing room */
    .share-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      padding: 4px 8px;
      border-radius: 6px;
    }
    .share-btn:active { background: var(--border); }
  </style>
</head>
<body>

<!-- JOIN SCREEN -->
<div id="joinScreen">
  <div class="join-logo">💬</div>
  <div class="join-title">Private Chat</div>
  <p class="join-sub">Sirf do log. Ek room code. Koi account nahi.</p>

  <div class="join-card">
    <div>
      <div class="field-label">Tumhara naam</div>
      <input type="text" id="nameInput" placeholder="Apna naam likho..." maxlength="20" autocomplete="off"/>
    </div>

    <div class="divider">ROOM CODE</div>

    <div>
      <div class="field-label">Room code (dono ko same dalna hai)</div>
      <input type="text" id="roomInput" placeholder="Koi bhi code likho..." maxlength="30" autocomplete="off"/>
    </div>

    <p class="room-hint">💡 Dono log same room code dalenge toh same room mein aa jaenge</p>

    <button class="btn-join" onclick="joinRoom()">Join Chat →</button>
  </div>
</div>

<!-- CHAT SCREEN -->
<div id="chatScreen">
  <div class="chat-header">
    <div class="header-avatar" id="headerAvatar">?</div>
    <div class="header-info">
      <div class="header-name" id="headerName">Private Room</div>
      <div class="header-status">
        <span class="status-dot"></span>
        <span id="onlineStatus">Connected</span>
      </div>
    </div>
    <button class="share-btn" onclick="copyRoom()" id="shareBtn">🔗 Room</button>
  </div>

  <div id="messages">
    <!-- messages appear here -->
  </div>

  <div class="typing-indicator" id="typingIndicator">
    <span id="typingName">Someone</span>
    <span>is typing</span>
    <div class="typing-dots">
      <div></div><div></div><div></div>
    </div>
  </div>

  <div class="input-area">
    <textarea id="msgInput" placeholder="Message..." rows="1"
      oninput="autoResize(this); sendTyping()"
      onkeydown="handleKey(event)"></textarea>
    <button class="btn-send" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
<script>
  const GUN_PEERS = [
    'https://gun-manhattan.herokuapp.com/gun',
    'https://peer.wallie.io/gun'
  ];

  let gun, room, myName, myRoom;
  let typingTimer;
  let lastDate = '';
  let messageKeys = new Set();

  function joinRoom() {
    const name = document.getElementById('nameInput').value.trim();
    const roomCode = document.getElementById('roomInput').value.trim();

    if (!name) { alert('Naam toh likhna hai yaar!'); return; }
    if (!roomCode) { alert('Room code bhi chahiye!'); return; }

    myName = name;
    myRoom = 'privatechat_' + roomCode.toLowerCase().replace(/\s+/g, '_');

    document.getElementById('joinScreen').style.display = 'none';
    const chatEl = document.getElementById('chatScreen');
    chatEl.style.display = 'flex';

    const av = document.getElementById('headerAvatar');
    av.textContent = name.charAt(0).toUpperCase();
    document.getElementById('headerName').textContent = '🔒 ' + roomCode;

    gun = Gun(GUN_PEERS);
    room = gun.get(myRoom);

    room.get('messages').map().on((data, key) => {
      if (!data || messageKeys.has(key)) return;
      messageKeys.add(key);
      renderMessage(data);
    });

    room.get('typing').on((data) => {
      if (!data || data.name === myName) return;
      const indicator = document.getElementById('typingIndicator');
      if (data.active && Date.now() - data.time < 4000) {
        document.getElementById('typingName').textContent = data.name;
        indicator.style.display = 'flex';
      } else {
        indicator.style.display = 'none';
      }
    });

    addSysMessage('Tum room mein aa gaye 🎉');
    document.getElementById('msgInput').focus();
  }

  function renderMessage(data) {
    const msgs = document.getElementById('messages');
    const isMe = data.sender === myName;

    // Date separator
    const msgDate = new Date(data.time).toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
    if (msgDate !== lastDate) {
      lastDate = msgDate;
      const sep = document.createElement('div');
      sep.className = 'date-sep';
      sep.textContent = msgDate;
      msgs.appendChild(sep);
    }

    const row = document.createElement('div');
    row.className = 'msg-row ' + (isMe ? 'me' : 'them');

    if (!isMe) {
      const senderEl = document.createElement('div');
      senderEl.className = 'msg-sender';
      senderEl.textContent = data.sender;
      row.appendChild(senderEl);
    }

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = data.text;
    row.appendChild(bubble);

    const timeEl = document.createElement('div');
    timeEl.className = 'msg-time';
    timeEl.textContent = new Date(data.time).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
    row.appendChild(timeEl);

    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function addSysMessage(text) {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'sys-msg';
    div.textContent = text;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function sendMessage() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text) return;

    const key = myName + '_' + Date.now();
    room.get('messages').get(key).put({
      sender: myName,
      text: text,
      time: Date.now()
    });

    room.get('typing').put({ name: myName, active: false, time: Date.now() });

    input.value = '';
    input.style.height = 'auto';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function sendTyping() {
    if (!room) return;
    room.get('typing').put({ name: myName, active: true, time: Date.now() });
    clearTimeout(typingTimer);
    typingTimer = setTimeout(() => {
      room.get('typing').put({ name: myName, active: false, time: Date.now() });
    }, 2500);
  }

  function copyRoom() {
    const roomDisplay = document.getElementById('headerName').textContent.replace('🔒 ', '');
    const text = `Join my private chat!\nRoom code: ${roomDisplay}\nLink: ${window.location.href}`;
    if (navigator.share) {
      navigator.share({ title: 'Private Chat', text: text });
    } else if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('shareBtn');
        btn.textContent = '✅ Copied!';
        setTimeout(() => btn.textContent = '🔗 Room', 2000);
      });
    }
  }

  // Enter key on join inputs
  document.addEventListener('DOMContentLoaded', () => {
    ['nameInput', 'roomInput'].forEach(id => {
      document.getElementById(id).addEventListener('keydown', e => {
        if (e.key === 'Enter') joinRoom();
      });
    });
  });
</script>
</body>
</html>
