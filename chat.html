<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat App</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .chat-container { width: 400px; height: 600px; background: white; border-radius: 12px; box-shadow: 0 2px 20px rgba(0,0,0,0.15); display: flex; flex-direction: column; overflow: hidden; }
  .header { background: #1877f2; padding: 14px 16px; display: flex; align-items: center; gap: 10px; }
  .header .avatar { width: 38px; height: 38px; border-radius: 50%; background: rgba(255,255,255,0.3); display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 14px; }
  .header .info .name { color: white; font-weight: 600; font-size: 15px; }
  .header .info .status { color: rgba(255,255,255,0.8); font-size: 12px; }
  .name-bar { background: #f0f2f5; padding: 8px 12px; display: flex; gap: 8px; align-items: center; border-bottom: 1px solid #ddd; }
  .name-bar input { flex: 1; padding: 6px 12px; border-radius: 20px; border: 1px solid #ddd; font-size: 13px; outline: none; }
  .name-bar button { padding: 6px 14px; background: #1877f2; color: white; border: none; border-radius: 20px; cursor: pointer; font-size: 13px; }
  .messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; background: #f0f2f5; }
  .msg { display: flex; flex-direction: column; max-width: 75%; }
  .msg.me { align-self: flex-end; align-items: flex-end; }
  .msg.other { align-self: flex-start; align-items: flex-start; }
  .sender-name { font-size: 11px; color: #666; margin-bottom: 2px; padding: 0 4px; }
  .bubble { padding: 9px 13px; border-radius: 18px; font-size: 14px; line-height: 1.4; word-break: break-word; }
  .msg.me .bubble { background: #1877f2; color: white; border-bottom-right-radius: 4px; }
  .msg.other .bubble { background: white; color: #050505; border: 1px solid #e0e0e0; border-bottom-left-radius: 4px; }
  .msg .time { font-size: 11px; color: #aaa; margin-top: 2px; padding: 0 4px; }
  .input-area { padding: 10px 12px; border-top: 1px solid #ddd; display: flex; gap: 8px; align-items: center; background: white; }
  .input-area input { flex: 1; padding: 9px 16px; border-radius: 22px; border: 1px solid #ddd; font-size: 14px; outline: none; background: #f0f2f5; }
  .input-area input:focus { border-color: #1877f2; background: white; }
  .send-btn { width: 38px; height: 38px; border-radius: 50%; background: #1877f2; border: none; cursor: pointer; font-size: 18px; color: white; display: flex; align-items: center; justify-content: center; }
  .send-btn:hover { background: #166fe5; }
</style>
</head>
<body>

<div class="chat-container">
  <div class="header">
    <div class="avatar" id="header-avatar">💬</div>
    <div class="info">
      <div class="name" id="header-name">Chat Room</div>
      <div class="status">🟢 Live</div>
    </div>
  </div>

  <div class="name-bar">
    <input type="text" id="username-input" placeholder="Apna naam likho..." maxlength="20" />
    <button onclick="setName()">Set ✓</button>
  </div>

  <div class="messages" id="messages">
    <div style="text-align:center; color:#aaa; font-size:13px; margin-top: 20px;">
      Upar apna naam likho, phir baat karo! 💬
    </div>
  </div>

  <div class="input-area">
    <input type="text" id="msg-input" placeholder="Message likho..." onkeydown="if(event.key==='Enter') sendMessage()" disabled />
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<!-- Gun.js - No account, no card, completely free! -->
<script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
<script>
  // Gun.js public relay servers use karo - bilkul free!
  const gun = Gun(['https://gun-manhattan.herokuapp.com/gun', 'https://gun-us.herokuapp.com/gun']);
  
  // Unique room ID - change this to anything you want
  const ROOM_ID = 'myapp-chatroom-2024';
  const messages = gun.get(ROOM_ID).get('messages');

  let myName = "";
  let seenMessages = new Set();

  function setName() {
    const inp = document.getElementById('username-input');
    const name = inp.value.trim();
    if (!name) { alert("Naam khaali nahi ho sakta!"); return; }
    myName = name;
    document.getElementById('header-name').textContent = name + " ka Chat";
    document.getElementById('header-avatar').textContent = name[0].toUpperCase();
    document.getElementById('msg-input').disabled = false;
    document.getElementById('msg-input').placeholder = "Message likho...";
    inp.disabled = true;
    document.querySelector('.name-bar button').disabled = true;
    document.getElementById('messages').innerHTML = '';
    document.getElementById('msg-input').focus();
  }

  function sendMessage() {
    if (!myName) { alert("Pehle naam set karo!"); return; }
    const inp = document.getElementById('msg-input');
    const text = inp.value.trim();
    if (!text) return;
    const id = Date.now() + Math.random();
    messages.get('' + id).put({
      name: myName,
      text: text,
      time: Date.now()
    });
    inp.value = '';
  }

  messages.map().on(function(data, id) {
    if (!data || !data.text || seenMessages.has(id)) return;
    seenMessages.add(id);
    const isMe = data.name === myName;
    const msgs = document.getElementById('messages');
    const time = new Date(data.time).toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'});
    const div = document.createElement('div');
    div.className = 'msg ' + (isMe ? 'me' : 'other');
    div.innerHTML = `
      ${!isMe ? `<div class="sender-name">${data.name}</div>` : ''}
      <div class="bubble">${data.text}</div>
      <div class="time">${time}</div>
    `;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  });
</script>

</body>
</html>
